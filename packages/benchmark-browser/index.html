<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PPC Circuit Benchmark (Browser)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    .subtitle { font-size: 0.85rem; color: #6b7280; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.25rem; margin-top: 1rem; }
    select, input { width: 100%; padding: 0.5rem; font-family: monospace; font-size: 0.85rem; border: 1px solid #ccc; border-radius: 4px; }
    button { margin-top: 1.25rem; padding: 0.6rem 1.5rem; font-size: 0.9rem; font-weight: 600; border: none; border-radius: 4px; cursor: pointer; background: #2563eb; color: #fff; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    #status { margin-top: 1rem; font-size: 0.9rem; min-height: 1.4rem; }
    #results { margin-top: 1rem; font-family: monospace; font-size: 0.82rem; white-space: pre-wrap; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 4px; padding: 0.75rem; display: none; }
    #download { display: none; margin-top: 0.75rem; background: #16a34a; }
  </style>
</head>
<body>
  <h1>PPC Circuit Benchmark</h1>
  <p class="subtitle">Client-side (browser WASM) proof generation benchmark</p>

  <label for="circuit">Circuit</label>
  <select id="circuit">
    <option value="membership">membership</option>
    <option value="non_membership">non_membership</option>
  </select>

  <label for="runs">Runs</label>
  <input id="runs" type="number" value="3" min="1" />

  <label for="leaves">Leaves</label>
  <input id="leaves" type="number" value="10" min="1" />

  <button id="start">Start Benchmark</button>
  <div id="status"></div>
  <pre id="results"></pre>
  <button id="download">Download Results JSON</button>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
